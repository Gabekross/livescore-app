<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="8"/>
  <!-- Pitch outline -->
  <rect x="60" y="50" width="280" height="200" rx="6" fill="#2563eb" opacity="0.04" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.2"/>
  <!-- Center line -->
  <line x1="200" y1="50" x2="200" y2="250" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.15"/>
  <!-- Center circle -->
  <circle cx="200" cy="150" r="30" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.15"/>
  <!-- Penalty areas -->
  <rect x="60" y="100" width="50" height="100" rx="3" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.12"/>
  <rect x="290" y="100" width="50" height="100" rx="3" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.12"/>
  <!-- Score overlay -->
  <rect x="130" y="110" width="140" height="80" rx="12" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="130" y="110" width="140" height="80" rx="12" fill="#ffffff" opacity="0.95"/>
  <!-- Team indicators -->
  <circle cx="162" cy="140" r="12" fill="#2563eb" opacity="0.15"/>
  <circle cx="238" cy="140" r="12" fill="#1d4ed8" opacity="0.15"/>
  <!-- Score -->
  <rect x="185" y="132" width="12" height="14" rx="3" fill="#2563eb" opacity="0.3"/>
  <circle cx="200" cy="139" r="2" fill="#0f172a" opacity="0.3"/>
  <rect x="203" y="132" width="12" height="14" rx="3" fill="#2563eb" opacity="0.3"/>
  <!-- Status line -->
  <rect x="170" y="162" width="60" height="5" rx="2" fill="#e2e8f0"/>
  <!-- Corner arcs -->
  <path d="M60 60 Q70 50 80 50" fill="none" stroke="#2563eb" stroke-width="1" stroke-opacity="0.15"/>
  <path d="M320 50 Q330 50 340 60" fill="none" stroke="#2563eb" stroke-width="1" stroke-opacity="0.15"/>
  <path d="M60 240 Q70 250 80 250" fill="none" stroke="#2563eb" stroke-width="1" stroke-opacity="0.15"/>
  <path d="M320 250 Q330 250 340 240" fill="none" stroke="#2563eb" stroke-width="1" stroke-opacity="0.15"/>
</svg>