<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="8"/>
  <!-- Lightning bolt -->
  <polygon points="210,50 175,145 205,145 185,245 250,130 215,130 240,50" fill="url(#bolt)" opacity="0.18"/>
  <polygon points="210,50 175,145 205,145 185,245 250,130 215,130 240,50" fill="none" stroke="#2563eb" stroke-width="2" stroke-linejoin="round" opacity="0.4"/>
  <!-- Publish icon / upload arrow -->
  <circle cx="130" cy="150" r="32" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
  <line x1="130" y1="165" x2="130" y2="138" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <polyline points="120,146 130,136 140,146" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Document base line -->
  <line x1="118" y1="165" x2="142" y2="165" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Radial speed lines -->
  <line x1="280" y1="90" x2="310" y2="75" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="285" y1="120" x2="320" y2="115" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="280" y1="150" x2="315" y2="155" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <line x1="275" y1="180" x2="308" y2="192" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  <!-- Speed dots -->
  <circle cx="325" cy="72" r="3" fill="#2563eb" opacity="0.25"/>
  <circle cx="335" cy="112" r="3" fill="#2563eb" opacity="0.2"/>
  <circle cx="330" cy="155" r="3" fill="#2563eb" opacity="0.2"/>
  <circle cx="322" cy="195" r="3" fill="#2563eb" opacity="0.15"/>
  <!-- Small accent circles -->
  <circle cx="85" cy="85" r="5" fill="#2563eb" opacity="0.1"/>
  <circle cx="90" cy="215" r="4" fill="#bfdbfe"/>
  <circle cx="310" cy="235" r="5" fill="#2563eb" opacity="0.08"/>
</svg>